name: CD

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run CD if CI passes (assuming we have a CI workflow named 'CI')
    # Uncomment the needs line below if you want CD to wait for CI
    # needs: [tests]

    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }} # usually 22
        script: |
          # Ganti path ini dengan lokasi proyek Anda di VPS
          cd /var/www/mybookshelf
          
          # Tarik perubahan terbaru dari GitHub
          git pull origin main
          
          # Install dependensi PHP (Production)
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
          
          # Install dependensi Node dan Build aset (Vite)
          npm install
          npm run build
          
          # Migrasi database
          php artisan migrate --force
          
          # Cache config, route, dan view untuk performa
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
